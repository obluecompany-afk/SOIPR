<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon — S.O.I</title>
<link rel="stylesheet" href="assets/theme.css" />
<style>
  body { overflow-x: hidden; }
</style>
</head>
<body>

<section class="kb-hero" style="background:#c9dfb7;height:100vh;">
  <div class="kb-hero__content" style="text-align:center;width:100%;padding:0 20px;">
    <div class="kb-logo" style="font-size:56px;color:#fff;margin:0 auto 30px;text-align:center;">
      S<span class="kb-logo__dot">.</span>O<span class="kb-logo__dot">.</span>I
    </div>
    <h1 class="kb-hero__title" style="font-size:48px;">COMING SOON</h1>
    <p style="color:#fff;font-size:16px;margin-top:20px;">
      Chúng tôi sắp ra mắt. Hãy đăng ký để nhận thông báo đầu tiên!
    </p>

    <div style="max-width:400px;margin:30px auto 0;" id="pw-form-wrap">
      <form id="pw-form">
        <input type="email" placeholder="Email của bạn" required class="kb-form-input" style="background:rgba(255,255,255,0.9);margin-bottom:0;" />
        <button type="submit" class="kb-btn-primary kb-btn-block" style="margin-top:12px;background:#fff;color:#111;">
          THÔNG BÁO CHO TÔI
        </button>
      </form>
    </div>
    <script>
      document.getElementById('pw-form').addEventListener('submit', function(e){
        e.preventDefault();
        var wrap = document.getElementById('pw-form-wrap');
        var div = document.createElement('div');
        div.className = 'kb-notice-success';
        div.textContent = 'Cảm ơn! Chúng tôi sẽ thông báo ngay khi mở cửa.';
        wrap.innerHTML = '';
        wrap.appendChild(div);
      });
    </script>

    <div style="margin-top:40px;font-size:12px;color:#fff;">
      <a href="#" style="color:#fff;text-decoration:underline;">Đăng nhập admin</a>
    </div>
  </div>
</section>

<script src="assets/animations.js" defer></script>
</body>
</html>
