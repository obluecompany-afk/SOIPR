<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đặt lại mật khẩu — S.O.I</title>
<link rel="stylesheet" href="assets/theme.css" />
</head>
<body>

<div data-kb-header></div>

<main>
  <section class="kb-section" style="max-width:480px;margin:0 auto;">
    <h1 class="kb-section-title">ĐẶT LẠI MẬT KHẨU</h1>
    <p class="kb-section-sub">Nhập mật khẩu mới cho tài khoản của bạn.</p>

    <form onsubmit="event.preventDefault(); alert('Demo: mật khẩu đã được đặt lại'); window.location='login.html';">
      <label class="kb-form-label">Mật khẩu mới</label>
      <input type="password" required class="kb-form-input" minlength="6" />

      <label class="kb-form-label">Xác nhận mật khẩu</label>
      <input type="password" required class="kb-form-input" minlength="6" />

      <button type="submit" class="kb-btn-primary kb-btn-block" style="margin-top:20px;">ĐẶT LẠI MẬT KHẨU</button>
    </form>

    <p class="kb-form-foot">
      Nhớ mật khẩu? <a href="login.html">Đăng nhập</a>
    </p>
  </section>
</main>

<div data-kb-footer></div>
<div data-kb-chrome></div>

<script src="assets/chrome.js" defer></script>
<script src="assets/theme.js" defer></script>
</body>
</html>
